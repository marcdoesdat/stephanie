<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="bot-field" />
      <input type="text" name="parcours" />
      <input type="text" name="q1" />
      <input type="text" name="q2" />
      <input type="text" name="delai" />
      <input type="text" name="situation" />
      <input type="text" name="prefcontact" />
      <input type="text" name="pa_timing" />
      <input type="text" name="pa_revenus" />
      <input type="text" name="pa_mise" />
      <input type="text" name="prenom" />
      <input type="text" name="nom" />
      <input type="email" name="email" />
      <input type="tel" name="telephone" />
      <textarea name="message"></textarea>
      <input type="text" name="consent" />
    </form>

    <form name="calculator-summary" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="calculator-summary" />
      <input type="text" name="bot-field" />
      <input type="text" name="nom" />
      <input type="tel" name="telephone" />
      <input type="email" name="email" />
      <input type="text" name="label_frequence" />
      <input type="text" name="versement" />
      <input type="text" name="montant_pret" />
      <input type="text" name="prime_schl" />
      <input type="text" name="cout_mensuel_total" />
      <input type="text" name="amortissement_url" />
      <input type="text" name="consentement" />
    </form>

    <form name="penalite-lead" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="penalite-lead" />
      <input type="text" name="bot-field" />
      <input type="text" name="prenom" />
      <input type="email" name="email" />
      <input type="tel" name="telephone" />
      <input type="text" name="scenario" />
      <input type="text" name="penalite" />
      <input type="text" name="consentement" />
    </form>

    <form name="simulator-gate" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="simulator-gate" />
      <input type="text" name="bot-field" />
      <input type="text" name="prenom" />
      <input type="email" name="email" />
      <input type="text" name="prix_max" />
      <input type="text" name="versement" />
      <input type="text" name="consentement" />
    </form>
    <form name="rappel" method="POST" data-netlify="true" data-netlify-honeypot="company" hidden>
      <input type="hidden" name="form-name" value="rappel" />
      <input type="text"     name="company" />
      <input type="text"     name="nom" />
      <input type="email"    name="courriel" />
      <input type="tel"      name="telephone" />
      <select name="type">
        <option value="Renouvellement">Renouvellement</option>
        <option value="Refinancement">Refinancement</option>
      </select>
      <input type="month"    name="echeance" />
      <input type="text"     name="institution" />
      <textarea              name="details"></textarea>
      <input type="checkbox" name="consentement" value="oui" />
    </form>
  </body>
</html>
