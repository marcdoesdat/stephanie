[build]
  command = "npm run build"
  publish = "dist"

[functions]
  # Restreint au strict minimum requis par le SSR (taux, config, utilitaires)
  included_files = [
    "src/services/**",
    "src/utils/**",
    "src/config/**",
  ]

# Headers de sécurité globaux
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cloud.umami.is https://api-gateway.umami.dev https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://cloud.umami.is https://api-gateway.umami.dev https://calendly.com https://assets.calendly.com; frame-src https://calendly.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/outils/penalite"
  to = "/outils/calculateur-penalite-hypothecaire"
  status = 301
  force = true

[[redirects]]
  from = "/outils/penalite/"
  to = "/outils/calculateur-penalite-hypothecaire/"
  status = 301
  force = true

# Redirections des anciennes pages standalone d'outils vers les onglets
[[redirects]]
  from = "/outils/simulateur"
  to = "/outils#simulateur"
  status = 301
  force = true

[[redirects]]
  from = "/outils/simulateur/"
  to = "/outils#simulateur"
  status = 301
  force = true

[[redirects]]
  from = "/outils/calculateur"
  to = "/outils#calculateur"
  status = 301
  force = true

[[redirects]]
  from = "/outils/calculateur/"
  to = "/outils#calculateur"
  status = 301
  force = true

[[redirects]]
  from = "/outils/comparateur"
  to = "/outils#comparateur"
